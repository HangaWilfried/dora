services:
  api:
    image: herman87/leavemanager:0.0.1-SNAPSHOT
    container_name: leavemanager
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/leavemanager?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_PROFILES_ACTIVE=dev
      - SERVER_PORT=8080
      - DEFAULT_SUPER_ADMIN_EMAIL=admin@example.com
      - DEFAULT_SUPER_ADMIN_PASSWORD=Admin@123
      - DEFAULT_ADMIN_PASSWORD=admin@123
      - DEFAULT_EMPLOYEE_PASSWORD=employee@123
      - DEFAULT_EMAIL_SUFFIX=@lao-sarl.com
      - SCHEDULER_FIXED_RATE=60000
      - TOKEN_EXPIRATION_DATE=3
    networks:
      - leavemanager-network
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: leavemanager-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=leavemanager
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - leavemanager-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 60s
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: leavemanager-phpmyadmin
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=mysql
      - PMA_USER=root
      - PMA_PASSWORD=rootpassword
    networks:
      - leavemanager-network
    depends_on:
      mysql:
        condition: service_healthy

networks:
  leavemanager-network:
    driver: bridge

volumes:
  mysql_data:
